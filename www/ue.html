<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des ECUE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex min-h-screen">
    <!-- Menu latéral -->
    <div class="w-64 bg-gray-800 text-white p-5">
        <ul class="space-y-2">
            <li class="p-4 hover:bg-gray-700 cursor-pointer rounded">Accueil</li>
            <li class="p-4 hover:bg-gray-700 cursor-pointer rounded">UE</li>
            <li class="p-4 hover:bg-gray-700 cursor-pointer rounded">ECUE</li>
            <li class="p-4 hover:bg-gray-700 cursor-pointer rounded">Semestres</li>
            <li class="p-4 hover:bg-gray-700 cursor-pointer rounded">Années Académiques</li>
            <li class="p-4 hover:bg-gray-700 cursor-pointer rounded">Paramètres</li>
        </ul>
    </div>

    <div class="flex-1 flex flex-col">
        <!-- Menu supérieur -->
        <div class="bg-blue-500 text-white p-4 flex justify-between items-center">
            <div class="text-2xl font-bold">Gestion des ECUE</div>
            <div>
                <span>Administrateur</span>
            </div>
        </div>

        <!-- Contenu principal -->
        <div class="p-5">
            <!-- Filtres -->
            <div class="flex gap-5 mb-5">
                <div class="flex-1 max-w-xs">
                    <select class="w-full p-2 border border-gray-300 rounded">
                        <option>UE</option>
                        <!-- Options UE -->
                    </select>
                </div>
                <div class="flex-1 max-w-xs">
                    <select class="w-full p-2 border border-gray-300 rounded">
                        <option>Semestre</option>
                        <!-- Options Semestre -->
                    </select>
                </div>
                <div class="flex-1 max-w-xs">
                    <select class="w-full p-2 border border-gray-300 rounded">
                        <option>Année Académique</option>
                        <!-- Options Année Académique -->
                    </select>
                </div>
            </div>

            <!-- Formulaire d'ajout -->
            <div class="bg-white p-5 rounded shadow mb-5">
                <h2 class="text-xl font-bold mb-4">Ajouter un ECUE</h2>
                <form>
                    <div class="flex gap-5 mb-4 flex-wrap">
                        <div class="flex-1 min-w-[200px]">
                            <label for="ue" class="block font-bold mb-1">UE</label>
                            <select id="ue" class="w-full p-2 border border-gray-300 rounded">
                                <option value="">Sélectionner UE</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[200px]">
                            <label for="intitule" class="block font-bold mb-1">Intitulé</label>
                            <input type="text" id="intitule" class="w-full p-2 border border-gray-300 rounded">
                        </div>
                        <div class="flex-1 min-w-[200px]">
                            <label for="coefficient" class="block font-bold mb-1">Coefficient</label>
                            <input type="number" id="coefficient" class="w-full p-2 border border-gray-300 rounded">
                        </div>
                    </div>
                    <button type="submit"
                        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Ajouter</button>
                </form>
            </div>

            <!-- Tableau des ECUE -->
            <table class="w-full mt-5">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="p-3 text-left font-bold">UE</th>
                        <th class="p-3 text-left font-bold">Intitulé</th>
                        <th class="p-3 text-left font-bold">Coefficient</th>
                        <th class="p-3 text-left font-bold">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 border-b border-gray-200">UE1</td>
                        <td class="p-3 border-b border-gray-200">Mathématiques</td>
                        <td class="p-3 border-b border-gray-200">3</td>
                        <td class="p-3 border-b border-gray-200">
                            <div class="flex gap-2">
                                <button
                                    class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">Modifier</button>
                                <button
                                    class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Supprimer</button>
                            </div>
                        </td>
                    </tr>
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 border-b border-gray-200">UE2</td>
                        <td class="p-3 border-b border-gray-200">Physique</td>
                        <td class="p-3 border-b border-gray-200">2</td>
                        <td class="p-3 border-b border-gray-200">
                            <div class="flex gap-2">
                                <button
                                    class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">Modifier</button>
                                <button
                                    class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Supprimer</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
