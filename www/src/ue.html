<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des UE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
        }

        /* Menu latéral */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 15px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .sidebar li:hover {
            background-color: #34495e;
        }

        /* Menu supérieur */
        .topbar {
            background-color: #3498db;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        /* Contenu principal */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .content {
            padding: 20px;
        }

        /* Filtres supérieurs */
        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-item {
            flex: 1;
            max-width: 200px;
        }

        .filter-item select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* Formulaire et tableau */
        .form-container {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-modifier {
            background-color: #f1c40f;
        }

        .btn-supprimer {
            background-color: #e74c3c;
        }
    </style>
</head>
<body>
    <!-- Menu latéral -->
    <div class="sidebar">
        <ul>
            <li>Accueil</li>
            <li>UE</li>
            <li>ECUE</li>
            <li>Semestres</li>
            <li>Années Académiques</li>
            <li>Paramètres</li>
        </ul>
    </div>

    <div class="main-content">
        <!-- Menu supérieur -->
        <div class="topbar">
            <div class="logo">Gestion des UE</div>
            <div class="user-info">
                <span>Administrateur</span>
            </div>
        </div>

        <!-- Contenu principal -->
        <div class="content">
            <!-- Filtres -->
            <div class="filters">
                <div class="filter-item">
                    <select name="niveau" title="Sélectionner le niveau">
                        <option>Niveau</option>
                        <option>Licence 1</option>
                        <option>Licence 2</option>
                        <option>Licence 3</option>
                        <option>Master 1</option>
                        <option>Master 2</option>
                    </select>
                </div>
                <div class="filter-item">
                    <select name="semestre" title="Sélectionner le semestre">
                        <option>Semestre</option>
                        <option>Semestre 1</option>
                        <option>Semestre 2</option>
                    </select>
                </div>
                <div class="filter-item">
                    <select name="annee" title="Sélectionner l'année académique">
                        <option>Année Académique</option>
                        <option>2023-2024</option>
                        <option>2022-2023</option>
                    </select>
                </div>
            </div>
            
            <!-- Formulaire d'ajout -->
            <div class="form-container">
                <h2>Ajouter une UE</h2>
                <form>
                    <div class="form-group">
                        <div class="input-group">
                            <label for="niveau">Niveau</label>
                            <select id="niveau">
                                <option value="">Sélectionner le niveau</option>
                                <option>Licence 1</option>
                                <option>Licence 2</option>
                                <option>Licence 3</option>
                                <option>Master 1</option>
                                <option>Master 2</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="semestre">Semestre</label>
                            <select id="semestre">
                                <option value="">Sélectionner le semestre</option>
                                <option>Semestre 1</option>
                                <option>Semestre 2</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="libelle">Libellé UE</label>
                            <input type="text" id="libelle" placeholder="Entrez le libellé de l'UE">
                        </div>
                        <div class="input-group">
                            <label for="credit">Crédit</label>
                            <input type="number" id="credit" placeholder="Nombre de crédits">
                        </div>
                    </div>
                    <button type="submit">Ajouter</button>
                </form>
            </div>

            <!-- Tableau des UE -->
            <table>
                <thead>
                    <tr>
                        <th>Niveau</th>
                        <th>Semestre</th>
                        <th>Libellé UE</th>
                        <th>Crédit</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Licence 1</td>
                        <td>Semestre 1</td>
                        <td>Mathématiques fondamentales</td>
                        <td>6</td>
                        <td class="actions">
                            <button class="btn-modifier">Modifier</button>
                            <button class="btn-supprimer">Supprimer</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Licence 1</td>
                        <td>Semestre 1</td>
                        <td>Physique générale</td>
                        <td>4</td>
                        <td class="actions">
                            <button class="btn-modifier">Modifier</button>
                            <button class="btn-supprimer">Supprimer</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
